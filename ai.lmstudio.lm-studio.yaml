app-id: ai.lmstudio.lm-studio
runtime: org.freedesktop.Platform
runtime-version: '25.08'
sdk: org.freedesktop.Sdk
base: org.electronjs.Electron2.BaseApp
base-version: '25.08'
command: lmstudio
finish-args:
  - --share=network
  - --share=ipc
  - --socket=wayland
  - --socket=fallback-x11
  - --socket=pulseaudio
  - --device=dri
  - --persist=.lmstudio
  - --talk-name=org.kde.StatusNotifierWatcher
separate-locales: false

modules:
  - name: unappimage
    buildsystem: simple
    build-options:
      cflags: -Wno-incompatible-pointer-types
    build-commands:
      - make -C squashfs-tools install INSTALL_DIR=/app/bin
    sources:
      - type: git
        url: https://github.com/refi64/unappimage
        commit: d7f86f2a0d7ec3a69211125207d5f127386b849a
  - name: lmstudio
    buildsystem: simple
    build-commands:
      - install -Dm755 -t ${FLATPAK_DEST}/bin/ apply_extra lmstudio
      - install -Dm644 -t ${FLATPAK_DEST}/share/icons/hicolor/128x128/apps ${FLATPAK_ID}.png
      - install -Dm644 -t ${FLATPAK_DEST}/share/applications ${FLATPAK_ID}.desktop
      - install -Dm644 -t ${FLATPAK_DEST}/share/metainfo ${FLATPAK_ID}.metainfo.xml
    sources:
      - type: script
        commands:
          - exec zypak-wrapper /app/extra/lmstudio/lm-studio "$@"
        dest-filename: lmstudio
      - type: script
        commands:
          - chmod +x ./lmstudio.AppImage && unappimage lmstudio.AppImage >/dev/null
          - mv squashfs-root lmstudio
          - rm -f lmstudio.AppImage
        dest-filename: apply_extra
      - type: extra-data
        only-arches: [x86_64]
        filename: lmstudio.AppImage
        url: https://installers.lmstudio.ai/linux/x64/0.4.16-1/LM-Studio-0.4.16-1-x64.AppImage
        sha256: 0cb07557b7529072a5273e820da1e01642718e9b5d18f2fd7b7df0ed95d1ddaf
        size: 1099177643
        x-checker-data:
          type: rotating-url
          url: https://lmstudio.ai/download/latest/linux/x64?format=AppImage
          pattern: https://installers.lmstudio.ai/linux/x64/([0-9.]+)/LM-Studio-([0-9.]+)-x64.AppImage
      - type: extra-data
        only-arches: [aarch64]
        filename: lmstudio.AppImage
        url: https://installers.lmstudio.ai/linux/arm64/0.4.16-1/LM-Studio-0.4.16-1-arm64.AppImage
        sha256: 2a9ebd873f7ae992eab9fda481358b97e25ec541b6f2f2959241d3e69b558ee6
        size: 1337608469
        x-checker-data:
          type: rotating-url
          url: https://lmstudio.ai/download/latest/linux/arm64?format=AppImage
          pattern: https://installers.lmstudio.ai/linux/arm64/([0-9.]+)/LM-Studio-([0-9.]+)-arm64.AppImage
      - type: file
        path: ai.lmstudio.lm-studio.desktop
      - type: file
        path: ai.lmstudio.lm-studio.metainfo.xml
      - type: file
        path: ai.lmstudio.lm-studio.png
