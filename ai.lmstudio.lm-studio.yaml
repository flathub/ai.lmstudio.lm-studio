app-id: ai.lmstudio.lm-studio
runtime: org.freedesktop.Sdk
runtime-version: '25.08'
sdk: org.freedesktop.Sdk
base: org.electronjs.Electron2.BaseApp
base-version: '25.08'
command: lmstudio
finish-args:
  - --share=network
  - --share=ipc
  - --socket=wayland
  - --socket=fallback-x11
  - --socket=pulseaudio
  - --device=all
  - --persist=.
  - --talk-name=org.kde.StatusNotifierWatcher
separate-locales: false

modules:
  - name: unappimage
    buildsystem: simple
    build-options:
      cflags: -Wno-incompatible-pointer-types
    build-commands:
      - make -C squashfs-tools install INSTALL_DIR=/app/bin
    sources:
      - type: git
        url: https://github.com/refi64/unappimage
        commit: d7f86f2a0d7ec3a69211125207d5f127386b849a
  - name: lmstudio
    buildsystem: simple
    build-commands:
      - install -Dm755 -t ${FLATPAK_DEST}/bin/ apply_extra lmstudio
      - install -Dm644 -t ${FLATPAK_DEST}/share/icons/hicolor/128x128/apps
        ${FLATPAK_ID}.png
      - install -Dm644 -t ${FLATPAK_DEST}/share/applications
        ${FLATPAK_ID}.desktop
      - install -Dm644 -t ${FLATPAK_DEST}/share/metainfo
        ${FLATPAK_ID}.metainfo.xml
    sources:
      - type: script
        commands:
          - exec zypak-wrapper /app/extra/lmstudio/lm-studio "$@"
        dest-filename: lmstudio
      - type: script
        commands:
          - chmod +x ./lmstudio.AppImage && unappimage lmstudio.AppImage
            >/dev/null
          - mv squashfs-root lmstudio
          - rm -f lmstudio.AppImage
        dest-filename: apply_extra
      - type: extra-data
        only-arches: [x86_64]
        filename: lmstudio.AppImage
        url: https://installers.lmstudio.ai/linux/x64/0.4.12-1/LM-Studio-0.4.12-1-x64.AppImage
        sha256: 53b4c990c52a98be1693bef3708376ff8205cfb6abb6f560d2c691123a06cbc2
        size: 1097509444
        x-checker-data:
          type: rotating-url
          url: https://lmstudio.ai/download/latest/linux/x64?format=AppImage
          pattern: https://installers.lmstudio.ai/linux/x64/([0-9.]+)/LM-Studio-([0-9.]+)-x64.AppImage
      - type: extra-data
        only-arches: [aarch64]
        filename: lmstudio.AppImage
        url: https://installers.lmstudio.ai/linux/arm64/0.4.12-1/LM-Studio-0.4.12-1-arm64.AppImage
        sha256: 1addd088fe0fdc1a5b45fee0bdd28b51a7fdfe8cff79e7f93346d5cc2a873d2c
        size: 1341244220
        x-checker-data:
          type: rotating-url
          url: https://lmstudio.ai/download/latest/linux/arm64?format=AppImage
          pattern: https://installers.lmstudio.ai/linux/arm64/([0-9.]+)/LM-Studio-([0-9.]+)-arm64.AppImage
      - type: file
        path: ai.lmstudio.lm-studio.desktop
      - type: file
        path: ai.lmstudio.lm-studio.metainfo.xml
      - type: file
        path: ai.lmstudio.lm-studio.png
